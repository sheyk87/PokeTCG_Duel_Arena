events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Compresión gzip para archivos estáticos para optimizar el rendimiento
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name pkncardbattle.com www.pkncardbattle.com localhost;

        # Directorio raíz donde estarán los archivos estáticos en el contenedor
        root /usr/share/nginx/html;
        index index.html;

        # Servir archivos estáticos del frontend
        location / {
            try_files $uri $uri/ =404;
        }

        # Control de caché para index.html para evitar versiones viejas
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # Caso Especial: positions.json se guarda dinámicamente en el backend.
        # Nginx debe redirigir la lectura de este archivo directamente al backend
        # para que se lea la versión actualizada en tiempo real.
        location = /Assets/Battlefields/positions.json {
            proxy_pass http://backend:3000/Assets/Battlefields/positions.json;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Desactivar caché explícitamente para este recurso
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Proxy Reverso para endpoints de API
        location /api/ {
            proxy_pass http://backend:3000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Reverso para la conexión de WebSockets (/ws)
        location /ws {
            proxy_pass http://backend:3000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Tiempos de espera extendidos para mantener WebSockets de partidas
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
